name: Release Validation

on:
  workflow_dispatch:
    inputs:
      include_release_smokes:
        description: Run clean-install and upgrade smokes
        type: boolean
        default: true
      include_resilience:
        description: Run worker restart and session regression smokes
        type: boolean
        default: true
      include_s3_regression:
        description: Run S3 SDK, edge, and policy regression smokes
        type: boolean
        default: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release-validation:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install SDK smoke dependencies
        run: python -m pip install boto3

      - name: Prepare CI environment file
        shell: pwsh
        run: Copy-Item .env.example .env -Force

      - name: Run release validation gate
        shell: pwsh
        run: >
          ./scripts/release-readiness.ps1
          ${{ inputs.include_release_smokes && '-IncludeReleaseSmokes' || '' }}
          ${{ inputs.include_resilience && '-IncludeResilience' || '' }}
          ${{ inputs.include_s3_regression && '-IncludeS3Regression' || '' }}

      - name: Collect support bundle on failure
        if: failure()
        shell: pwsh
        run: >
          ./scripts/support-bundle.ps1
          -FallbackAdminPassword "ReleaseSmoke!234"

      - name: Upload support bundles
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-validation-support-bundles
          path: artifacts/support-bundles/*.zip
          if-no-files-found: warn
