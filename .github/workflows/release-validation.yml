name: Release Validation

on:
  workflow_dispatch:
    inputs:
      include_release_smokes:
        description: Run clean-install and upgrade smokes
        type: boolean
        default: true
      include_resilience:
        description: Run worker restart and session regression smokes
        type: boolean
        default: true
      include_s3_regression:
        description: Run S3 SDK, edge, and policy regression smokes
        type: boolean
        default: true
      include_distributed_regression:
        description: Run distributed live-migration beta smoke
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
          cache: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install SDK smoke dependencies
        run: python -m pip install boto3

      - name: Prepare CI environment file
        shell: pwsh
        run: Copy-Item .env.example .env -Force

      - name: Run release validation gate
        shell: pwsh
        run: >
          ./scripts/release-readiness.ps1
          ${{ inputs.include_release_smokes && '-IncludeReleaseSmokes' || '' }}
          ${{ inputs.include_resilience && '-IncludeResilience' || '' }}
          ${{ inputs.include_s3_regression && '-IncludeS3Regression' || '' }}

      - name: Prepare distributed beta smoke environment
        if: ${{ inputs.include_distributed_regression }}
        shell: bash
        run: |
          cp .env.example .env.distributed
          cat >> .env.distributed <<'EOF'
          STORAGE_BACKEND=distributed
          STORAGE_DISTRIBUTED_ENDPOINTS=http://blobnode-a:9100,http://blobnode-b:9100,http://blobnode-c:9100
          STORAGE_DISTRIBUTED_REPLICAS=3
          EOF

      - name: Run distributed live-migration smoke
        if: ${{ inputs.include_distributed_regression }}
        shell: bash
        run: |
          docker compose --profile distributed --env-file .env.distributed up --build -d
          bash ./scripts/distributed-migration-smoke.sh

      - name: Collect support bundle on failure
        if: failure()
        shell: pwsh
        run: >
          ./scripts/support-bundle.ps1
          -FallbackAdminPassword "ReleaseSmoke!234"

      - name: Upload support bundles
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: release-validation-support-bundles
          path: artifacts/support-bundles/*.zip
          if-no-files-found: warn

      - name: Tear down distributed beta smoke stack
        if: ${{ always() && inputs.include_distributed_regression }}
        shell: bash
        run: docker compose --profile distributed --env-file .env.distributed down -v --remove-orphans
