name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: cryptic-stack/harborshield-backend
  FRONTEND_IMAGE_NAME: cryptic-stack/harborshield-frontend

jobs:
  validate-release:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install SDK smoke dependencies
        run: python -m pip install boto3

      - name: Prepare CI environment file
        shell: pwsh
        run: Copy-Item .env.example .env -Force

      - name: Run full release validation gate
        shell: pwsh
        run: >
          ./scripts/release-readiness.ps1
          -IncludeReleaseSmokes
          -IncludeResilience
          -IncludeS3Regression

      - name: Prepare distributed beta smoke environment
        shell: bash
        run: |
          cp .env.example .env.distributed
          cat >> .env.distributed <<'EOF'
          STACK_ENV_FILE=.env.distributed
          STORAGE_BACKEND=distributed
          STORAGE_DISTRIBUTED_ENDPOINTS=http://blobnode-a:9100,http://blobnode-b:9100,http://blobnode-c:9100
          STORAGE_DISTRIBUTED_REPLICAS=3
          EOF

      - name: Run distributed live-migration smoke
        shell: bash
        run: |
          docker compose --env-file .env down --remove-orphans
          docker compose --profile distributed --env-file .env.distributed up --build -d --force-recreate
          bash ./scripts/distributed-migration-smoke.sh

      - name: Collect support bundle on failure
        if: failure()
        shell: pwsh
        run: >
          ./scripts/support-bundle.ps1
          -FallbackAdminPassword "ReleaseSmoke!234"

      - name: Upload support bundles
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: release-validation-support-bundles
          path: artifacts/support-bundles/*.zip
          if-no-files-found: warn

      - name: Tear down distributed beta smoke stack
        if: ${{ always() }}
        shell: bash
        run: docker compose --profile distributed --env-file .env.distributed down -v --remove-orphans

  publish-release:
    needs: validate-release
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          backend_tags="${REGISTRY}/${BACKEND_IMAGE_NAME}:${version}"
          frontend_tags="${REGISTRY}/${FRONTEND_IMAGE_NAME}:${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${REGISTRY}/${BACKEND_IMAGE_NAME}:${version}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${REGISTRY}/${FRONTEND_IMAGE_NAME}:${version}" >> "$GITHUB_OUTPUT"
          if [[ "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "publish_latest=true" >> "$GITHUB_OUTPUT"
            backend_tags+=$'\n'"${REGISTRY}/${BACKEND_IMAGE_NAME}:latest"
            frontend_tags+=$'\n'"${REGISTRY}/${FRONTEND_IMAGE_NAME}:latest"
          else
            echo "publish_latest=false" >> "$GITHUB_OUTPUT"
          fi
          {
            echo "backend_tags<<EOF"
            echo "$backend_tags"
            echo "EOF"
            echo "frontend_tags<<EOF"
            echo "$frontend_tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push backend runtime image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.backend_tags }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.frontend_tags }}

      - name: Create release bundle
        shell: pwsh
        run: >
          ./scripts/create-release-bundle.ps1
          -Version "${{ steps.meta.outputs.version }}"
          -ApiImage "${{ steps.meta.outputs.backend_image }}"
          -WorkerImage "${{ steps.meta.outputs.backend_image }}"
          -BlobnodeImage "${{ steps.meta.outputs.backend_image }}"
          -FrontendImage "${{ steps.meta.outputs.frontend_image }}"

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          extra_args=()
          if [[ "${{ steps.meta.outputs.publish_latest }}" != "true" ]]; then
            extra_args+=(--prerelease)
          fi
          gh release create "${GITHUB_REF_NAME}" \
            "artifacts/releases/HarborShield-${GITHUB_REF_NAME}.zip" \
            "artifacts/releases/HarborShield-${GITHUB_REF_NAME}.tar.gz" \
            "artifacts/releases/HarborShield-${GITHUB_REF_NAME}-sha256.txt" \
            --generate-notes \
            --title "HarborShield ${GITHUB_REF_NAME}" \
            "${extra_args[@]}"
