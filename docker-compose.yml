x-service-defaults: &service-defaults
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  logging:
    options:
      max-size: ${COMPOSE_LOG_MAX_SIZE:-10m}
      max-file: "${COMPOSE_LOG_MAX_FILES:-3}"

x-app-defaults: &app-defaults
  <<: *service-defaults
  init: true

services:
  postgres:
    <<: *service-defaults
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [core]

  redis:
    <<: *service-defaults
    image: ${REDIS_IMAGE:-redis:7-alpine}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [core]

  api:
    <<: *app-defaults
    build:
      context: ./backend
    env_file:
      - ${STACK_ENV_FILE:-.env}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - object_data:/data
      - ${BLOBNODE_TLS_CERTS_DIR:-./deploy/certs/blobnode}:/blobnode-certs:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [core, edge]

  worker:
    <<: *app-defaults
    build:
      context: ./backend
    command: ["./worker"]
    env_file:
      - ${STACK_ENV_FILE:-.env}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - object_data:/data
      - ${BLOBNODE_TLS_CERTS_DIR:-./deploy/certs/blobnode}:/blobnode-certs:ro
    healthcheck:
      test: ["CMD", "pgrep", "worker"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [core]

  blobnode-a:
    <<: *app-defaults
    build:
      context: ./backend
    command: ["./blobnode"]
    profiles: ["distributed"]
    env_file:
      - ${STACK_ENV_FILE:-.env}
    environment:
      BLOBNODE_NAME: blobnode-a
      BLOBNODE_PORT: 9100
      BLOBNODE_ROOT: /blobdata
      BLOBNODE_API_URL: http://api:8080
      BLOBNODE_ADVERTISE_URL: http://blobnode-a:9100
    volumes:
      - blobnode_a_data:/blobdata
      - ${BLOBNODE_TLS_CERTS_DIR:-./deploy/certs/blobnode}:/blobnode-certs:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9100/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [core]

  blobnode-b:
    <<: *app-defaults
    build:
      context: ./backend
    command: ["./blobnode"]
    profiles: ["distributed"]
    env_file:
      - ${STACK_ENV_FILE:-.env}
    environment:
      BLOBNODE_NAME: blobnode-b
      BLOBNODE_PORT: 9100
      BLOBNODE_ROOT: /blobdata
      BLOBNODE_API_URL: http://api:8080
      BLOBNODE_ADVERTISE_URL: http://blobnode-b:9100
    volumes:
      - blobnode_b_data:/blobdata
      - ${BLOBNODE_TLS_CERTS_DIR:-./deploy/certs/blobnode}:/blobnode-certs:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9100/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [core]

  blobnode-c:
    <<: *app-defaults
    build:
      context: ./backend
    command: ["./blobnode"]
    profiles: ["distributed"]
    env_file:
      - ${STACK_ENV_FILE:-.env}
    environment:
      BLOBNODE_NAME: blobnode-c
      BLOBNODE_PORT: 9100
      BLOBNODE_ROOT: /blobdata
      BLOBNODE_API_URL: http://api:8080
      BLOBNODE_ADVERTISE_URL: http://blobnode-c:9100
    volumes:
      - blobnode_c_data:/blobdata
      - ${BLOBNODE_TLS_CERTS_DIR:-./deploy/certs/blobnode}:/blobnode-certs:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9100/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [core]

  blobnode-d:
    <<: *app-defaults
    build:
      context: ./backend
    command: ["./blobnode"]
    profiles: ["distributed"]
    env_file:
      - ${STACK_ENV_FILE:-.env}
    environment:
      BLOBNODE_NAME: blobnode-d
      BLOBNODE_PORT: 9100
      BLOBNODE_ROOT: /blobdata
      BLOBNODE_API_URL: http://api:8080
      BLOBNODE_ADVERTISE_URL: http://blobnode-d:9100
    volumes:
      - blobnode_d_data:/blobdata
      - ${BLOBNODE_TLS_CERTS_DIR:-./deploy/certs/blobnode}:/blobnode-certs:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9100/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [core]

  frontend:
    <<: *app-defaults
    build:
      context: ./frontend
    env_file:
      - ${STACK_ENV_FILE:-.env}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [edge]

  caddy:
    <<: *service-defaults
    image: ${CADDY_IMAGE:-caddy:2-alpine}
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [edge]

  clamav:
    <<: *service-defaults
    image: ${CLAMAV_IMAGE:-clamav/clamav:stable}
    profiles: ["clamav"]
    networks: [core]

  prometheus:
    <<: *service-defaults
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v2.53.4}
    profiles: ["prometheus"]
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./deploy/init/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      api:
        condition: service_healthy
    networks: [edge, core]

  webhook-receiver:
    <<: *app-defaults
    image: ${WEBHOOK_RECEIVER_IMAGE:-python:3.12-alpine}
    profiles: ["smoke"]
    command: ["python", "/scripts/webhook_receiver.py", "19091", "/scripts/phase5-event-receiver.log"]
    volumes:
      - ./scripts:/scripts
    networks: [core]

volumes:
  postgres_data:
  redis_data:
  object_data:
  blobnode_a_data:
  blobnode_b_data:
  blobnode_c_data:
  blobnode_d_data:
  caddy_data:
  caddy_config:

networks:
  core:
    internal: true
  edge:
