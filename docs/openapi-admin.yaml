components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT or opaque admin token

  parameters:
    BucketID:
      in: path
      name: bucketID
      required: true
      schema:
        type: string
    UserID:
      in: path
      name: userID
      required: true
      schema:
        type: string
    AccessKey:
      in: path
      name: accessKey
      required: true
      schema:
        type: string
    RoleName:
      in: path
      name: roleName
      required: true
      schema:
        type: string
    StatementID:
      in: path
      name: statementID
      required: true
      schema:
        type: string
    BindingID:
      in: path
      name: bindingID
      required: true
      schema:
        type: string

  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
    StatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    Session:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        mustChangePassword:
          type: boolean
        user:
          type: object
          additionalProperties: true
    FlexibleObject:
      type: object
      additionalProperties: true
    ItemsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            additionalProperties: true
    RoleStatementWrite:
      type: object
      required: [action, resource, effect]
      properties:
        action:
          type: string
        resource:
          type: string
        effect:
          type: string
        conditions:
          type: object
          additionalProperties:
            type: string
